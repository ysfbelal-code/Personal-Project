// CLASS: CalendarManager — monthly calendar with exam dates
// ═══════════════════════════════════════════════════════════════
class CalendarManager {
  // State: which month/year is currently displayed
  static _year  = new Date().getFullYear();
  static _month = new Date().getMonth(); // 0-based

  // Render the calendar widget into a container element
  static renderWidget(container){
    if(!container) return;
    const session = Store.getSession();
    if(!session) return;

    const uid    = session.id;
    const today  = new Date();
    const year   = CalendarManager._year;
    const month  = CalendarManager._month;
    const exams  = Store.getExams(uid);

    // Month name
    const monthName = new Date(year, month, 1).toLocaleString("en-GB",{month:"long",year:"numeric"});

    // First day of month (0=Sun … 6=Sat) and total days
    const firstDow   = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth= new Date(year, month+1, 0).getDate();

    // Build day-of-week headers (Mon first)
    const DOWS = ["Mo","Tu","We","Th","Fr","Sa","Su"];
    // Offset: Mon=0 grid column. JS getDay() is Sun=0. Convert: Mon=1→0, Tue=2→1 … Sun=0→6
    const startOffset = (firstDow === 0) ? 6 : firstDow - 1;

    // Build grid cells
    let cells = "";
    // Empty cells before day 1
    for(let i=0;i<startOffset;i++) cells += '<div class="cal-day empty"></div>';
    // Day cells
    for(let d=1;d<=daysInMonth;d++){
      const dateStr  = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const isToday  = (d===today.getDate() && month===today.getMonth() && year===today.getFullYear());
      const hasExam  = exams.some(e=>e.date===dateStr);
      const cls      = ["cal-day", isToday?"today":"", hasExam?"has-exam":""].filter(Boolean).join(" ");
      // Tooltip with exam subject on hover
      const examSubjects = exams.filter(e=>e.date===dateStr).map(e=>e.subject).join(", ");
      const title = hasExam ? ` title="${examSubjects}"` : "";
      cells += `<div class="${cls}"${title} onclick="CalendarManager.openExamModal('${dateStr}',this)">${d}</div>`;
    }

    // Upcoming exams list
    const futureExams = exams
      .filter(e=>e.date >= today.toISOString().slice(0,10))
      .sort((a,b)=>a.date.localeCompare(b.date))
      .slice(0,6);

    const examListHtml = futureExams.length
      ? '<div class="exam-list">' +
          futureExams.map(e=>`
            <span class="exam-chip" title="${e.date}">
              📅 ${e.subject} · ${CalendarManager._fmtDate(e.date)}
              <button onclick="CalendarManager.removeExam('${uid}','${e.id}')" title="Remove">✕</button>
            </span>`).join("") +
        '</div>'
      : '<p style="font-size:11px;color:var(--text3);margin-top:6px;">No upcoming exams added yet.</p>';

    container.innerHTML = `
      <div class="cal-widget">
        <div class="cal-header">
          <span class="cal-title">📅 ${monthName}</span>
          <div style="display:flex;gap:6px;">
            <button class="cal-nav-btn" onclick="CalendarManager.prev()">‹</button>
            <button class="cal-nav-btn" onclick="CalendarManager.next()">›</button>
          </div>
        </div>
        <div class="cal-grid">
          ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join("")}
          ${cells}
        </div>
        ${examListHtml}
        <button class="cal-add-btn" onclick="CalendarManager.openExamModal(null,null)">＋ Add exam date</button>
      </div>`;
  }

  // Navigate
  static prev(){
    CalendarManager._month--;
    if(CalendarManager._month < 0){ CalendarManager._month=11; CalendarManager._year--; }
    CalendarManager.renderWidget(document.getElementById("cal-container"));
  }
  static next(){
    CalendarManager._month++;
    if(CalendarManager._month > 11){ CalendarManager._month=0; CalendarManager._year++; }
    CalendarManager.renderWidget(document.getElementById("cal-container"));
  }

  // Remove an exam and re-render
  static removeExam(uid, examId){
    Store.removeExam(uid, examId);
    CalendarManager.renderWidget(document.getElementById("cal-container"));
    Toast.success("Exam removed.");
  }

  // Format YYYY-MM-DD → "12 Jan 2025"
  static _fmtDate(dateStr){
    const d = new Date(dateStr+"T12:00:00");
    return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
  }

  // Open a small modal to add an exam on a specific date
  static openExamModal(dateStr, _btn){
    const session = Store.getSession();
    if(!session) return;
    const profile = Store.getProfile(session.id)||{};
    const subjects = (profile.subjects||[]).map(s=>s.name);

    // Build the modal if it doesn't exist
    let modal = document.getElementById("exam-modal");
    if(!modal){
      modal = document.createElement("div");
      modal.id = "exam-modal";
      modal.className = "modal-bg";
      modal.addEventListener("click", function(e){ if(e.target===modal) CalendarManager.closeExamModal(); });
      document.body.appendChild(modal);
    }

    const today = new Date().toISOString().slice(0,10);
    modal.innerHTML = `
      <div class="modal fade-in" style="max-width:360px;">
        <h2 class="modal-title">Add Exam Date</h2>
        <div class="input-group">
          <label class="input-label">Subject</label>
          <select class="input select" id="exam-subj">
            <option value="">Select subject…</option>
            ${subjects.map(s=>`<option value="${s}">${s}</option>`).join("")}
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="input-group" id="exam-other-group" style="display:none;">
          <label class="input-label">Subject name</label>
          <input class="input" id="exam-other-text" placeholder="Enter subject…"/>
        </div>
        <div class="input-group">
          <label class="input-label">Exam Date</label>
          <input class="input" id="exam-date" type="date" value="${dateStr||today}" min="${today}"/>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-ghost" onclick="CalendarManager.closeExamModal()">Cancel</button>
          <button class="btn btn-primary" style="flex:1;" onclick="CalendarManager.saveExam('${session.id}')">Add Exam</button>
        </div>
      </div>`;
    modal.classList.add("open");

    // Show text field when "Other" selected
    document.getElementById("exam-subj").addEventListener("change",function(){
      document.getElementById("exam-other-group").style.display = this.value==="Other"?"block":"none";
    });
  }

  static closeExamModal(){
    const m = document.getElementById("exam-modal");
    if(m) m.classList.remove("open");
  }

  static saveExam(uid){
    let subject = (document.getElementById("exam-subj")||{}).value||"";
    if(subject === "Other") subject = (document.getElementById("exam-other-text")||{}).value.trim();
    const date  = (document.getElementById("exam-date")||{}).value||"";
    if(!subject){ Toast.error("Choose a subject."); return; }
    if(!date)   { Toast.error("Choose a date."); return; }
    Store.addExam(uid, {id:"ex"+Date.now(), subject, date});
    CalendarManager.closeExamModal();
    CalendarManager.renderWidget(document.getElementById("cal-container"));
    Toast.success("Exam added: "+subject+" on "+CalendarManager._fmtDate(date));
  }
}

class StudyPlanManager {
  static openScreen(){ Store.set("plan_text",""); Router.go("studyplan"); }

  static async generate(spaces){
    if(!spaces.length) return "No spaces yet. Create some first.";
    var names=spaces.map(function(s){return s.name;}).join(", ");
    var prompt=[
      "Generate a weekly study plan for these study spaces: "+names+".",
      "Rules:",
      "- One or two spaces per day (Mon-Sun)",
      "- Suggest a Pomodoro format e.g. 25/5 x 4 or 50/10 x 3",
      "- No times of day. No filler. Just the plan.",
      "Format exactly:",
      "**Monday**: Revise [Space] - 50/10 x 3",
      "**Tuesday**: Revise [Space] - 25/5 x 4",
      "...through Sunday."
    ].join("\n");
    return AIManager.callGroq([{role:"user",content:prompt}],"llama-3.3-70b-versatile",512);
  }

  static _parsePlan(plan, spaces){
    var days=[];
    plan.split("\n").forEach(function(line){
      // Match: **Monday**: [Revise] SpaceName [-—] pomodoro
      // Also handle plain: Monday: SpaceName - pomodoro
      var m=line.match(/\*{0,2}([A-Za-z]+day)\*{0,2}[:\s]+(?:[Rr]evise\s+)?([^—\-\n:]+?)\s*[-—]\s*(.+)/i);
      if(m&&m[1]&&m[2]&&m[3]){
        var name=m[2].trim().replace(/\*+/g,"");
        if(!name) return;
        var sp=spaces.find(function(s){return s.name.toLowerCase()===name.toLowerCase();})||null;
        // Fuzzy match - check if any space name is contained in the line
        if(!sp) sp=spaces.find(function(s){
          return line.toLowerCase().indexOf(s.name.toLowerCase())!==-1;
        })||null;
        if(sp) name=sp.name; // use exact space name
        days.push({day:m[1].trim(),spaceName:name,pomodoro:m[3].trim().replace(/\*+/g,""),space:sp});
      }
    });
    return days;
  }

  static async render(el){
    var session=Store.getSession();
    var spaces=Store.getSpaces(session.id);
    var plan=Store.get("plan_text","");

    el.innerHTML=
      '<button class="back-link" onclick="Router.go(\'dashboard\')">← Dashboard</button>'+
      '<h1 class="page-title">Weekly Study Plan</h1>'+
      '<div id="plan-area" style="display:flex;align-items:center;gap:10px;padding:20px;'+
      'background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);">'+
      '<div class="spinner"></div><span style="color:var(--text2);">Building your study plan…</span>'+
      '</div>';

    if(!plan){
      try{
        plan=await StudyPlanManager.generate(spaces);
        Store.set("plan_text",plan);
      }catch(e){
        document.getElementById("plan-area").innerHTML=
          '<p style="color:var(--red);">Error: '+e.message+'</p>';
        return;
      }
    }

    var days=StudyPlanManager._parsePlan(plan,spaces);
    var planArea=document.getElementById("plan-area");

    if(days.length===0){
      var fb=plan.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");
      planArea.innerHTML='<div class="analysis-box" style="width:100%;">'+fb+'</div>';
    } else {
      planArea.innerHTML=days.map(function(d){
        var mistakes=d.space?Store.getMistakes(session.id,d.space.id):[];
        var focusHtml;
        if(mistakes.length>0){
          var recent=mistakes.slice(-4);
          focusHtml=
            '<div style="margin-top:12px;padding:10px 12px;background:#0E0A1E;border-left:3px solid var(--violet);border-radius:0 var(--radius-sm) var(--radius-sm) 0;">'+
            '<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9B72FA;margin-bottom:5px;">Focus on</div>'+
            recent.map(function(m){
              return '<div style="font-size:12px;color:#C4B5FD;margin:2px 0;">• '+
                m.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>';
            }).join('')+
            '</div>';
        } else {
          focusHtml=
            '<div style="margin-top:10px;font-size:11.5px;color:var(--text3);display:flex;align-items:center;gap:6px;">'+
            '<span>✏️</span><span>Take a quiz on this space to get personalised focus tips.</span></div>';
        }
        return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">'+
          '<strong style="font-size:13.5px;color:var(--cyan);">'+d.day+'</strong>'+
          '<span style="font-size:11px;color:var(--text3);font-family:var(--mono);">'+d.pomodoro+'</span>'+
          '</div>'+
          '<div style="font-size:13px;color:var(--text);">Revise <strong>'+d.spaceName+'</strong></div>'+
          focusHtml+
          '</div>';
      }).join('');
    }

    var actions=document.createElement("div");
    actions.style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;";
    actions.innerHTML=
      '<button class="btn btn-ghost" onclick="Store.set(\'plan_text\',' +
      "'" + '\');StudyPlanManager.render(document.getElementById(\'screen\'))">Regenerate</button>'+
      '<button class="btn btn-ghost" onclick="StudyPlanManager.download()">Download plan</button>'+
      '<button class="btn btn-primary" onclick="Router.go(\'quiz\')">✏️ Take a Quiz</button>';
    el.appendChild(actions);
  }

  static download(){
    var a=document.createElement("a");
    a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(Store.get("plan_text",""));
    a.download="study_plan.txt"; a.click();
  }
}


// ═══════════════════════════════════════════════════════════════
// CLASS: App — initialisation
// ═══════════════════════════════════════════════════════════════
class App {
  static init(){
    AIManager.refreshAvailableModels();

    const session=Store.getSession();
    if(session){
      const spaces=Store.getSpaces(session.id);
      spaces.forEach(sp=>{
        Store.getNotes(session.id,sp.id).forEach(n=>{ SpaceManager._noteStore[n.id]=n; });
      });
      const profile=Store.getProfile(session.id);
      Router.go(profile?"dashboard":"onboard");
    } else {
      Router.go("welcome");
    }
  }
}

// ── Boot ─────────
document.addEventListener("DOMContentLoaded", App.init);

</script>
</body>
</html>
